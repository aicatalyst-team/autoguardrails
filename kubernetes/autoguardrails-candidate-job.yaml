apiVersion: batch/v1
kind: Job
metadata:
  name: autoguardrails-candidate
  namespace: poc-autoguardrails
  labels:
    app: autoguardrails
    autopoc.io/project: autoguardrails
    autopoc.io/scenario: candidate-evaluation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app: autoguardrails
        scenario: candidate-evaluation
    spec:
      containers:
        - name: autoguardrails
          image: image-registry.openshift-image-registry.svc:5000/autopoc-test-builds/autoguardrails:latest
          imagePullPolicy: Always
          command: ["python3", "-m", "autoguardrails"]
          args: ["candidate", "--repeat", "2", "--notes", "poc-candidate-test"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
